<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo App - JS Project</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="app">

        <h1 class="title">Todo App</h1>

        <div class="input-container">
            <input id="taskInput" class="task-input" type="text" placeholder="Add a new task...">

            <button id="addBtn" class="add-btn">
                Add
            </button>

            <button id="themeToggle" class="theme-toggle">
                🌙
            </button>

        </div>

        <ul id="taskList" class="task-list"></ul>

        <p id="emptyState" class="empty-state">
            No tasks yet — add your first task 🚀
        </p>

        <div class="footer">

            <span id="taskCount" class="task-count"></span>

            <div class="filters">
                <button data-filter="all" class="filter-btn active">All</button>
                <button data-filter="active" class="filter-btn">Active</button>
                <button data-filter="completed" class="filter-btn">Completed</button>
            </div>

            <button id="clearCompleted" class="clear-btn">
                Clear Completed
            </button>

        </div>

        <footer class="signature">
            Built by Ivan — JavaScript Developer
        </footer>

    </div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
